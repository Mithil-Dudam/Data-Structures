services:
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    working_dir: /app

  frontend:
    build:
      context: ./app_ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
